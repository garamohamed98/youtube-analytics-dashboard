<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Analytics Dashboard</title>

    <meta
      name="description"
      content="A YouTube Analytics Dashboard that lets you explore detailed insights and performance metrics of any channel with clean visualizations and interactive charts."
    />

    <!-- Open Graph (for Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="YouTube Analytics Dashboard" />
    <meta
      property="og:description"
      content="Explore analytics of any YouTube channel with interactive charts, performance metrics, and clear visual insights."
    />
    <meta property="og:image" content="https://ytbanalytics.netlify.app/preview.png" />
    <meta property="og:url" content="https://ytbanalytics.netlify.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card (for Twitter/X previews) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YouTube Analytics Dashboard" />
    <meta
      name="twitter:description"
      content="Explore analytics of any YouTube channel with interactive charts, performance metrics, and clear visual insights."
    />
    <meta name="twitter:image" content="https://ytbanalytics.netlify.app/preview.png" />

    <meta name="keywords" content="YouTube analytics, dashboard, channel insights, stats, charts" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
